  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
      --text: #f0ede8; --text-muted: #888; --text-faint: #444;
      --gold: #c9a84c; --gold-light: #f0d080;
      --radius: 14px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,168,76,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
    }
    .wrap { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 3rem 1.25rem 4rem; }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px,6vw,56px); font-weight: 400; color: var(--text); letter-spacing: -0.5px; margin-bottom: 0.4rem; }
    .header h1 em { color: var(--gold); font-style: normal; }
    .header p { font-size: 13px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.5px; }
    .search-wrap { position: relative; }
    .search-bar { display: flex; align-items: center; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
    .search-bar:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    .search-icon { padding: 0 14px 0 18px; color: var(--text-muted); font-size: 18px; flex-shrink: 0; display: flex; align-items: center; }
    .search-bar input { flex: 1; height: 52px; background: transparent; border: none; outline: none; font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--text); caret-color: var(--gold); }
    .search-bar input::placeholder { color: var(--text-faint); }
    .clear-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0 16px; font-size: 18px; display: none; }
    .clear-btn.visible { display: block; }
    .clear-btn:hover { color: var(--text); }
    .suggestions { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius); z-index: 100; display: none; max-height: 340px; overflow-y: auto; }
    .suggestions.open { display: block; }
    .suggestions::-webkit-scrollbar { width: 4px; }
    .suggestions::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .suggestion-item { display: flex; align-items: center; gap: 14px; padding: 10px 16px; cursor: pointer; transition: background 0.1s; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--surface2); }
    .s-flag { width: 36px; height: 24px; border-radius: 3px; overflow: hidden; flex-shrink: 0; background: var(--surface2); border: 0.5px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .s-flag img { width: 100%; height: 100%; object-fit: cover; }
    .s-names { flex: 1; }
    .s-name-de { font-size: 14px; font-weight: 500; color: var(--text); }
    .s-name-en { font-size: 12px; color: var(--text-muted); }
    .s-name-ar { font-family: serif; direction: rtl; }
    .results-section { margin-top: 2.5rem; }
    .results-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem; }
    .flag-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .flag-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.15s; animation: popIn 0.25s ease both; }
    .flag-card:hover { border-color: var(--gold); transform: translateY(-2px); }
    @keyframes popIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    .flag-img-wrap { width: 100%; aspect-ratio: 3/2; background: var(--surface2); overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .flag-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .flag-img-wrap .placeholder { font-size: 13px; color: var(--text-faint); font-family: monospace; }
    .flag-info { padding: 10px 12px; }
    .flag-name-de { font-size: 13px; font-weight: 500; color: var(--text); }
    .flag-name-en { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .flag-name-ar { font-size: 11px; color: var(--text-muted); direction: rtl; text-align: right; margin-top: 2px; font-family: serif; }
    .single-result { margin-top: 2rem; display: none; animation: fadeIn 0.3s ease; }
    .single-result.show { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .flag-hero { display: flex; gap: 2rem; align-items: flex-start; background: var(--surface); border: 0.5px solid var(--border2); border-radius: 18px; padding: 2rem; }
    .flag-hero-img { width: 260px; flex-shrink: 0; aspect-ratio: 3/2; border-radius: var(--radius-sm); overflow: hidden; background: var(--surface2); border: 0.5px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .flag-hero-img img { width: 100%; height: 100%; object-fit: cover; }
    .flag-hero-info h2 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
    .names { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1.25rem; }
    .name-row { display: flex; align-items: center; gap: 8px; }
    .name-lang { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; min-width: 28px; }
    .name-val { font-size: 14px; color: var(--text-muted); }
    .name-val.ar { font-family: serif; font-size: 16px; direction: rtl; }
    .code-badge { font-size: 11px; color: var(--text-faint); font-family: monospace; background: var(--surface2); padding: 4px 10px; border-radius: 4px; display: inline-block; }
    @media (max-width: 600px) {
      .flag-hero { flex-direction: column; gap: 1.25rem; }
      .flag-hero-img { width: 100%; }
      .flag-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
    #installBtn { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; background: var(--gold); color: #0a0a0a; border: none; border-radius: 999px; padding: 10px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    #installBtn:hover { background: var(--gold-light); }

</div>
<button id="installBtn" onclick="installPWA()">+ App installieren</button>

// Bild: code.png  →  de.png, fr.png, sy.png ...
function mkImg(code) {
  const img = document.createElement('img');
  img.src = code + '.png';
  img.alt = code;
  img.loading = 'lazy';
  img.onerror = function() {
    this.style.display = 'none';
    const p = document.createElement('span');
    p.className = 'placeholder';
    p.textContent = code.toUpperCase();
    this.parentNode.appendChild(p);
  };
  return img;
}

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const suggestionsEl = document.getElementById('suggestions');
const flagGrid = document.getElementById('flagGrid');
const resultsLabel = document.getElementById('resultsLabel');
const singleResult = document.getElementById('singleResult');
const resultsSection = document.getElementById('resultsSection');
let activeIdx = -1;

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ß/g,'ss');
}
function matches(c,q) {
  const nq = normalize(q);
  return normalize(c.de).includes(nq) || normalize(c.en).includes(nq) || c.ar.includes(q);
}
function startsWith(c,q) {
  const nq = normalize(q);
  return normalize(c.de).startsWith(nq) || normalize(c.en).startsWith(nq) || c.ar.startsWith(q);
}

function renderGrid(list, label) {
  resultsLabel.textContent = label || `${list.length} Länder`;
  flagGrid.innerHTML = '';
  singleResult.classList.remove('show');
  singleResult.innerHTML = '';
  resultsSection.style.display = '';
  list.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'flag-card';
    card.style.animationDelay = (i * 0.015) + 's';
    card.onclick = () => showSingle(c);
    const iw = document.createElement('div'); iw.className = 'flag-img-wrap'; iw.appendChild(mkImg(c.code));
    const info = document.createElement('div'); info.className = 'flag-info';
    info.innerHTML = `<div class="flag-name-de">${c.de}</div><div class="flag-name-en">${c.en}</div><div class="flag-name-ar">${c.ar}</div>`;
    card.appendChild(iw); card.appendChild(info); flagGrid.appendChild(card);
  });
}

function showSingle(c) {
  suggestionsEl.classList.remove('open');
  input.value = c.de;
  clearBtn.classList.add('visible');
  resultsSection.style.display = 'none';
  singleResult.innerHTML = `
    <div class="flag-hero">
      <div class="flag-hero-img"></div>
      <div class="flag-hero-info">
        <h2>${c.de}</h2>
        <div class="names">
          <div class="name-row"><span class="name-lang">DE</span><span class="name-val">${c.de}</span></div>
          <div class="name-row"><span class="name-lang">EN</span><span class="name-val">${c.en}</span></div>
          <div class="name-row"><span class="name-lang">AR</span><span class="name-val ar">${c.ar}</span></div>
        </div>
        <div class="code-badge">Datei: ${c.code}.png</div>
      </div>
    </div>`;
  singleResult.querySelector('.flag-hero-img').appendChild(mkImg(c.code));
  singleResult.classList.add('show');
}

function renderSuggestions(q) {
  if (!q) { suggestionsEl.classList.remove('open'); return; }
  const sw = COUNTRIES.filter(c => startsWith(c, q)).slice(0, 8);
  if (!sw.length) { suggestionsEl.classList.remove('open'); return; }
  suggestionsEl.innerHTML = '';
  sw.forEach(c => {
    const item = document.createElement('div'); item.className = 'suggestion-item'; item.onclick = () => showSingle(c);
    const fd = document.createElement('div'); fd.className = 's-flag'; fd.appendChild(mkImg(c.code));
    const nm = document.createElement('div'); nm.className = 's-names';
    nm.innerHTML = `<div class="s-name-de">${c.de}</div><div class="s-name-en">${c.en} · <span class="s-name-ar">${c.ar}</span></div>`;
    item.appendChild(fd); item.appendChild(nm); suggestionsEl.appendChild(item);
  });
  activeIdx = -1; suggestionsEl.classList.add('open');
}

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearBtn.classList.toggle('visible', q.length > 0);
  if (!q) { suggestionsEl.classList.remove('open'); singleResult.classList.remove('show'); resultsSection.style.display=''; renderGrid(COUNTRIES,'Alle Länder'); return; }
  renderSuggestions(q);
  const found = COUNTRIES.filter(c => matches(c, q));
  if (found.length > 0 && found.length < COUNTRIES.length) { renderGrid(found, `${found.length} Ergebnis${found.length!==1?'se':''} für „${q}"`); resultsSection.style.display=''; singleResult.classList.remove('show'); }
});

input.addEventListener('keydown', e => {
  const items = suggestionsEl.querySelectorAll('.suggestion-item');
  if (e.key==='ArrowDown') { e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); activeIdx=Math.max(activeIdx-1,-1); items.forEach((el,i)=>el.classList.toggle('active',i===activeIdx)); }
  else if (e.key==='Enter') { if(activeIdx>=0&&items[activeIdx]){items[activeIdx].click();}else{suggestionsEl.classList.remove('open');const found=COUNTRIES.filter(c=>matches(c,input.value.trim()));if(found.length===1)showSingle(found[0]);} }
  else if (e.key==='Escape') { suggestionsEl.classList.remove('open'); }
});

document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) suggestionsEl.classList.remove('open'); });

function clearSearch() {
  input.value=''; clearBtn.classList.remove('visible'); suggestionsEl.classList.remove('open');
  singleResult.classList.remove('show'); resultsSection.style.display='';
  renderGrid(COUNTRIES,'Alle Länder'); input.focus();
}

renderGrid(COUNTRIES, 'Alle Länder');

if ('serviceWorker' in navigator) {
  const sw=`const C='flaggen-v3';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{e.respondWith(caches.open(C).then(cache=>cache.match(e.request).then(r=>r||fetch(e.request).then(res=>{cache.put(e.request,res.clone());return res;}))));});`;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='block';});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBtn').style.display='none';});}
window.addEventListener('appinstalled',()=>{document.getElementById('installBtn').style.display='none';});
</script>
